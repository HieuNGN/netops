# ============================================================
# NetOps — Production Docker Compose
# ============================================================
# Services:
#   - postgres   : PostgreSQL 16 (internal network only, persistent volume)
#   - backend    : FastAPI + Uvicorn (SNMP, topology, API, SSE)
#   - frontend   : Nginx + React SPA (reverse proxy, SSE passthrough)
#
# Usage:
#   Development:  docker compose -f docker-compose.yml -f docker-compose.override.yml up --build
#   Production:   docker compose -f docker-compose.yml up -d --build
#
# Production features:
#   - PostgreSQL not exposed to host (internal network only)
#   - Read-only root filesystems on backend + frontend
#   - Tmpfs for writable runtime dirs
#   - Restart always on all services
#   - Health checks with depends_on conditions
#   - Named volumes for persistent data
#   - Resource limits commented out (enable as needed)
# ============================================================

services:
  # --------------------------------------------------------------
  # PostgreSQL Database
  # --------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: netops-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-netops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netops}
      PGDATA: /var/lib/postgresql/data/pgdata
    # Production: no host port binding — internal network only.
    # Enable in development via docker-compose.override.yml.
    ports: []
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-netops} -d ${POSTGRES_DB:-netops}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - netops-network
    # Resource limits (uncomment for production tuning)
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '2.0'
    #       memory: 1G

  # --------------------------------------------------------------
  # Backend API Server (FastAPI + Uvicorn)
  # --------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: netops-backend
    restart: always
    # read_only: true  # disabled — uvicorn workers need writable /dev/shm
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /dev/shm:noexec,nosuid,size=100m
    environment:
      # Database
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-netops}
      POSTGRES_USER: ${POSTGRES_USER:-netops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-netops}
      # Server
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      # SNMP
      SNMP_HOST: ${SNMP_HOST:-127.0.0.1}
      SNMP_COMMUNITY: ${SNMP_COMMUNITY:-public}
      SNMP_TIMEOUT: ${SNMP_TIMEOUT:-5}
      SNMP_RETRIES: ${SNMP_RETRIES:-3}
      # Auth (required — fail-fast on missing)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in .env}
      # Encryption at rest for SNMP credentials (optional)
      NETOPS_ENCRYPTION_KEY: ${NETOPS_ENCRYPTION_KEY:-}
      # Discovery
      NETOPS_AUTO_DISCOVER_MODE: ${NETOPS_AUTO_DISCOVER_MODE:-merge}
      NETOPS_NETWORK_CHECK_INTERVAL: ${NETOPS_NETWORK_CHECK_INTERVAL:-60}
      # Cookie secure flag (set to 1 for HTTPS frontend)
      NETOPS_COOKIE_SECURE: ${NETOPS_COOKIE_SECURE:-0}
      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Python
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - netops-network

  # --------------------------------------------------------------
  # Frontend Web Server (Nginx + React SPA)
  # --------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    container_name: netops-frontend
    restart: always
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - netops-network

# ============================================================
# Named Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  netops-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
