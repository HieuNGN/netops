version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: netops-postgres
    environment:
      POSTGRES_DB: netops
      POSTGRES_USER: netops
      POSTGRES_PASSWORD: netops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netops -d netops"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - netops-network

  # Backend API Server
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: netops-backend
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: netops
      DB_USER: netops
      DB_PASSWORD: netops
      # SNMP configuration
      SNMP_HOST: 192.168.1.1
      SNMP_COMMUNITY: public
      SNMP_TIMEOUT: 2
      SNMP_RETRIES: 1
      # Server configuration
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - netops-network

  # Frontend Web Server
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: netops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - netops-network

volumes:
  postgres_data:
    driver: local
  backend_data:
    driver: local

networks:
  netops-network:
    driver: bridge
