server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets (hashed files from Vite)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon / static images short cache
    location ~* \.(ico|png|jpg|jpeg|svg|gif|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # --------------------------------------------------------------
    # SSE streams — handled first so buffering is disabled. The
    # /api prefix is stripped on forward so FastAPI's bare
    # /topology/stream and /events/stream work.
    # --------------------------------------------------------------
    location ^~ /api/topology/stream {
        proxy_pass http://backend:8000/topology/stream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location ^~ /api/events/stream {
        proxy_pass http://backend:8000/events/stream;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket proxy (future-proofing for WS upgrades)
    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
    }

    # --------------------------------------------------------------
    # API Proxy — /api/* with path-aware rewrite. FastAPI mounts
    # most endpoints at the bare path (/devices, /topology, etc.)
    # but the auth and config routers live under /api/auth/* and
    # /api/config. We rewrite the frontend's /api/X to the
    # backend's actual path. The rules below keep the path
    # structure intact; SPA routes never hit this block because
    # they don't start with /api.
    # --------------------------------------------------------------
    location /api/ {
        # Default rewrite: strip /api prefix (used by the majority
        # of endpoints which are mounted at the bare path).
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # /api/auth/* and /api/config keep the /api prefix because
    # FastAPI mounts them there. Listed first so the more general
    # /api/ block above does not strip the prefix.
    location ^~ /api/auth {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    location ^~ /api/config {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # --------------------------------------------------------------
    # SPA fallback — must be last. All non-API paths serve
    # index.html so client-side routing works for hard refreshes
    # on /devices, /checks, /alerts, /topology, /topology/history,
    # /settings, /login, etc.
    # --------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
