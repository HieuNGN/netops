# ============================================================
# NetOps — Development Docker Compose Override
# ============================================================
# Docker Compose auto-picks this up when running from docker/.
#
# Changes from docker-compose.yml (production):
#   - Postgres port exposed to host for local DB tools
#   - Source code mounted as read-only for hot-reload
#   - Debug logging
#   - Nginx config mounted for quick edits
#   - Read-only rootfs disabled (rw for dev tooling)
# ============================================================

services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  backend:
    read_only: false
    tmpfs: []
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../src:/app/src:ro
      - ../scripts:/app/scripts:ro
    environment:
      LOG_LEVEL: DEBUG
      NETOPS_COOKIE_SECURE: "0"
    # Enable auto-reload (requires watchfiles: pip install watchfiles)
    # command: ["python", "-m", "uvicorn", "src.collector.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "src"]

  frontend:
    read_only: false
    tmpfs: []
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1
