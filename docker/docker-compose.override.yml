# ============================================================
# NetOps - Development Docker Compose Override
# ============================================================
# Usage: automatically picked up by docker compose up
#   (place this file next to docker-compose.yml in docker/)
#
# Changes from base:
#   - Mounts local source code for iterative development
#   - Debug logging
#   - Exposes postgres port for local tooling access
# ============================================================

services:
  backend:
    volumes:
      # Mount source for iterative backend changes without rebuild
      - ../src:/app/src:ro
      - ../scripts:/app/scripts:ro
    environment:
      LOG_LEVEL: DEBUG
    # Optional: enable auto-reload if watchfiles is installed
    # command: ["python", "-m", "uvicorn", "src.collector.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--reload-dir", "src"]

  frontend:
    volumes:
      # Mount nginx config for quick tweaks
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1

  postgres:
    # In dev, keep port exposed for local DB tools
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
