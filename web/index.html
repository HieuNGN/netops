<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetOps Vision - Network Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const effective = theme === 'system'
          ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        if (effective === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script>
      // Nuke stale service workers from previous projects that hijacked localhost:3000
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) {
              console.warn('[SW] Unregistering stale service worker:', reg.scope);
              reg.unregister();
            });
          });
          // Also wipe any old caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(name) {
                console.warn('[Cache] Deleting stale cache:', name);
                caches.delete(name);
              });
            });
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
